services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=dinheiro_facil
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@dinheirofacil.com
      - PGADMIN_DEFAULT_PASSWORD=admin
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_WTF_CSRF_ENABLED=False
      - PGADMIN_CONFIG_PROXY_X_FOR_COUNT=1
      - PGADMIN_CONFIG_PROXY_X_PROTO_COUNT=1
      - PGADMIN_CONFIG_PROXY_X_HOST_COUNT=1
      - PGADMIN_CONFIG_PROXY_X_PORT_COUNT=1
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      - db

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JWT_SECRET: "dev_jwt_secret_change_me"
    restart: always
    environment:
      - DATABASE_URL=postgresql://admin:admin@db:5432/dinheiro_facil?schema=public
      - NEXTAUTH_SECRET=fallback_secret_change_me_in_production
      - NEXTAUTH_URL=https://localhost
    depends_on:
      - db

  rate-limit-cleaner:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JWT_SECRET: "dev_jwt_secret_change_me"
    restart: always
    environment:
      - DATABASE_URL=postgresql://admin:admin@db:5432/dinheiro_facil?schema=public
      - RATE_LIMIT_RETENTION_MINUTES=30
      - RATE_LIMIT_CLEANUP_INTERVAL_SECONDS=900
    depends_on:
      - db
    command:
      - sh
      - -c
      - |
        while true; do
          node scripts/cleanup-rate-limit.js
          sleep "$${RATE_LIMIT_CLEANUP_INTERVAL_SECONDS:-3600}"
        done

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "5443:5443"
    depends_on:
      - app
      - pgadmin

volumes:
  postgres_data:
  pgadmin_data:
